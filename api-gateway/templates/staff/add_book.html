{% extends 'base.html' %}

{% block title %}Add Book - Bookstore{% endblock %}

{% block content %}
<h2>Add New Book</h2>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="title" class="form-label">Title</label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>
                    <div class="mb-3">
                        <label for="author" class="form-label">Author</label>
                        <input type="text" class="form-control" id="author" name="author" required>
                    </div>
                    <div class="mb-3">
                        <label for="book_type_key" class="form-label">Book Type</label>
                        <select class="form-select" id="book_type_key" name="book_type_key" required>
                            <option value="">-- Select Book Type --</option>
                            {% for book_type in book_types %}
                            <option value="{{ book_type.type_key }}">{{ book_type.name_vi|default:book_type.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="price" class="form-label">Price (VND)</label>
                        <input type="number" step="1" min="0" class="form-control" id="price" name="price" required>
                    </div>
                    <div class="mb-3">
                        <label for="stock" class="form-label">Stock</label>
                        <input type="number" class="form-control" id="stock" name="stock" required>
                    </div>
                    <div class="mb-3">
                        <label for="category_id" class="form-label">Category</label>
                        <select class="form-select" id="category_id" name="category_id">
                            <option value="">-- Select Category --</option>
                            {% for category in categories %}
                            <option value="{{ category.id }}">{{ category.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="4"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Book</button>
    <a href="/staff/books/" class="btn btn-secondary">Cancel</a>
                </form>
            {% endblock %}
